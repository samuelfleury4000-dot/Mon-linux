<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Roulette</title>
    <style>
        body { font-family: sans-serif; background: linear-gradient(180deg, #07131e 0%, #04080c 100%); color: white; padding: 20px; }
        .page { max-width: 760px; margin: auto; }
        .box { background: rgba(10, 18, 32, 0.96); border-radius: 22px; padding: 28px; margin-bottom: 20px; box-shadow: 0 24px 48px rgba(0,0,0,0.3); }
        .wheel { width: 280px; height: 280px; border-radius: 50%; background: radial-gradient(circle at center, #122c41 45%, #081016 100%); display: grid; place-items: center; margin: 0 auto 20px; border: 14px solid #1fa2ff; position: relative; overflow: hidden; }
        .wheel::after { content: ''; position: absolute; inset: 0; border-radius: 50%; box-shadow: inset 0 0 60px rgba(0,0,0,0.55); }
        .ball { width: 20px; height: 20px; background: #ffe066; border-radius: 50%; box-shadow: 0 0 18px rgba(255,224,102,0.9); position: absolute; top: 34px; left: calc(50% - 10px); transition: transform 1s ease; }
        button { padding: 16px 20px; border: none; border-radius: 16px; background: #38b6ff; color: white; font-size: 18px; cursor: pointer; width: 100%; }
        .result { margin-top: 18px; font-size: 1.15rem; min-height: 32px; text-align: center; }
        .legend { color: #9cc9ff; margin-bottom: 18px; }
    </style>
</head>
<body>
    <div id="appHeader"></div>
    <div class="page">
        <div class="box">
            <h1>Roulette</h1>
            <p class="legend">Misez sur une couleur. Rouge/Noir: 48.6% (Payout 1.95x), Vert: 2.7% (Payout 13x)</p>
            <div class="wheel"><div class="ball" id="rouletteBall"></div></div>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px;">
                <button id="btnRed" onclick="setColor('red')" style="background:#ff6b6b;">Rouge</button>
                <button id="btnBlack" onclick="setColor('black')" style="background:#333;">Noir</button>
                <button id="btnGreen" onclick="setColor('green')" style="background:#54ff7a;">Vert</button>
            </div>
            <input id="amount" type="number" placeholder="Montant à miser" step="0.01" min="0.01" style="width:100%;padding:14px;margin-top:14px;border-radius:14px;border:1px solid #26455f;background:#061122;color:white;">
            <button onclick="playGame('roulette')">Tourner la roulette</button>
            <p class="result" id="gameResult"></p>
            <button style="margin-top: 18px; background: #1f4d6e;" onclick="window.location.href='index.html'">Retour</button>
        </div>
    </div>
    <script src="app.js"></script>
    <script>
        const ball = document.getElementById('rouletteBall');
        let selectedColor = 'red';

        function setColor(color) {
            selectedColor = color;
            document.getElementById('btnRed').style.background = color === 'red' ? '#ff4444' : '#ff6b6b';
            document.getElementById('btnBlack').style.background = color === 'black' ? '#1a1a1a' : '#333';
            document.getElementById('btnGreen').style.background = color === 'green' ? '#2ecc71' : '#54ff7a';
        }

        function animateRoulette() {
            const angle = Math.floor(Math.random() * 360);
            ball.style.transform = `rotate(${angle}deg) translateX(110px)`;
        }

        async function playGame(type) {
            if (!await requireLogin()) return;
            const amount = parseFloat(document.getElementById('amount').value);
            const result = document.getElementById('gameResult');
            const btn = event.target;
            if (!amount || amount <= 0) {
                result.innerText = 'Montant invalide.';
                return;
            }
            btn.disabled = true;
            result.innerText = '⏳ Roulette en cours...';
            animateRoulette();
            const response = await apiFetch('/game/' + type, { method: 'POST', body: { amount, choice: selectedColor } });
            setTimeout(() => {
                btn.disabled = false;
                if (response.ok && response.data.success) {
                    saveSession({ ...getSession(), balance: response.data.balance });
                    const color = response.data.details?.color || '?';
                    result.innerText = response.data.result === 'win' ? `🎉 ${color.toUpperCase()} ! Vous gagnez ${response.data.payout.toFixed(2)}$` : `❌ ${color}... Retentez.`;
                } else {
                    result.innerText = `❌ ${response.data.message || 'Erreur du jeu.'}`;
                }
            }, 800);
        }

        window.addEventListener('DOMContentLoaded', async () => {
            renderHeader();
            await requireLogin();
            setColor('red');
        });
    </script>
</body>
</html>
