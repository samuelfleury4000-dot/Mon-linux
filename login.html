<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <title>Connexion Casino</title>
</head>
<body>
    <div class="box">
        <h1>Connexion / Inscription</h1>
        <p>Entrez un ID et un mot de passe pour vous connecter ou créer un compte.</p>
        <input id="userId" placeholder="ID utilisateur" autocomplete="username">
        <input id="password" type="password" placeholder="Mot de passe" autocomplete="current-password">
        <button onclick="loginUser()">Se connecter</button>
        <p id="message"></p>
        <p><a href="index.html">Retour à l'accueil</a></p>
    </div>
    <script src="app.js"></script>
    <script>
        async function loginUser() {
            const userId = document.getElementById('userId').value.trim();
            const password = document.getElementById('password').value.trim();
            const message = document.getElementById('message');
            message.innerText = '';
            if (!userId || !password) {
                message.innerText = 'Veuillez renseigner un ID et un mot de passe.';
                return;
            }
            const response = await apiFetch('/auth/login', { method: 'POST', body: { userId, password } });
            if (response.ok && response.data.success) {
                saveSession({ token: response.data.token, userId: response.data.userId, role: response.data.role });
                window.location.href = 'index.html';
            } else {
                message.innerText = response.data.message || 'Échec de connexion.';
            }
        }
    </script>
</body>
</html>
