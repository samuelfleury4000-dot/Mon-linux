<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <title>Machines à sous</title>
    <style>
        body { font-family: sans-serif; background: linear-gradient(180deg, #09121b 0%, #06090f 100%); color: white; padding: 20px; }
        .page { max-width: 760px; margin: auto; }
        .box { background: rgba(10, 20, 33, 0.96); border-radius: 22px; padding: 28px; margin-bottom: 20px; box-shadow: 0 25px 45px rgba(0,0,0,0.3); }
        button { padding: 16px 20px; border: none; border-radius: 16px; background: #38b6ff; color: white; font-size: 18px; cursor: pointer; width: 100%; }
        .reels { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
        .reel { background: radial-gradient(circle at top, #163652, #0d1c2d); border: 2px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 32px 0; text-align: center; font-size: 44px; font-weight: 800; color: #fff; transition: transform 0.2s ease; }
        .reel.spin { transform: scale(1.1); }
        .result { margin-top: 18px; font-size: 1.2rem; min-height: 32px; text-align: center; }
        .legend { color: #9cc9ff; margin-bottom: 18px; }
    </style>
</head>
<body>
    <div id="appHeader"></div>
    <div class="page">
        <div class="box">
            <h1>Machines à sous</h1>
            <p class="legend">Clin d'œil casino : 3 symboles identiques = gain x8.5. Probabilité: 3%, House edge: 4%. Bonne chance !</p>
            <div class="reels" id="reelRow">
                <div class="reel">🍒</div>
                <div class="reel">🍋</div>
                <div class="reel">⭐</div>
            </div>
            <input id="amount" type="number" placeholder="Montant à miser" step="0.01" min="0.01" style="width:100%;padding:14px;margin-top:14px;border-radius:14px;border:1px solid #26455f;background:#061122;color:white;">
            <button onclick="playGame('slots')">Spin</button>
            <p class="result" id="gameResult"></p>
            <button style="margin-top: 18px; background: #1f4d6e;" onclick="window.location.href='index.html'">Retour</button>
        </div>
    </div>
    <script src="app.js"></script>
    <script>
        const symbols = ['🍒','🍋','⭐','🔔','7','🍉'];

        function spinReels() {
            const reels = document.querySelectorAll('.reel');
            reels.forEach((reel, index) => {
                reel.classList.add('spin');
                setTimeout(() => reel.classList.remove('spin'), 300);
                reel.innerText = symbols[Math.floor(Math.random() * symbols.length)];
            });
        }

        function setFinalReels(values) {
            const reels = document.querySelectorAll('.reel');
            values.forEach((value, index) => {
                reels[index].innerText = value;
            });
        }

        async function playGame(type) {
            if (!await requireLogin()) return;
            const amount = parseFloat(document.getElementById('amount').value);
            const resultText = document.getElementById('gameResult');
            const btn = event.target;
            if (!amount || amount <= 0) {
                resultText.innerText = 'Montant invalide.';
                return;
            }
            btn.disabled = true;
            resultText.innerText = '⏳ Lancement...';
            const interval = setInterval(spinReels, 120);
            const response = await apiFetch('/game/' + type, { method: 'POST', body: { amount } });
            setTimeout(() => {
                clearInterval(interval);
                btn.disabled = false;
                if (response.ok && response.data.success) {
                    saveSession({ ...getSession(), balance: response.data.balance });
                    const winning = response.data.result === 'win';
                    const finalValues = winning ? [symbols[4], symbols[4], symbols[4]] : [symbols[Math.floor(Math.random() * 5)], symbols[Math.floor(Math.random() * 5)], symbols[Math.floor(Math.random() * 5)]];
                    setFinalReels(finalValues);
                    resultText.innerText = winning ? `🎉 Gagné ${response.data.payout.toFixed(2)}$!` : '❌ Dommage, tente encore.';
                } else {
                    resultText.innerText = `❌ ${response.data.message || 'Erreur du jeu.'}`;
                }
            }, 900);
        }

        window.addEventListener('DOMContentLoaded', async () => {
            renderHeader();
            await requireLogin();
            spinReels();
        });
    </script>
</body>
</html>
